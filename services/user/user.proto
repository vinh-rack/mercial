syntax = "proto3";

package user;

service UserService {
  rpc Register (RegisterRequest) returns (UserResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc GetUserById (GetUserByIdRequest) returns (UserResponse);
  rpc GetUserByEmail (GetUserByEmailRequest) returns (UserResponse);
  rpc ModifyUser (ModifyUserRequest) returns (UserResponse);
  rpc DeactivateUser (DeactivateUserRequest) returns (SuccessResponse);
  rpc DeleteUser (DeleteUserRequest) returns (SuccessResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
  string phone = 5;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message GetUserByIdRequest {
  uint64 user_id = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

message ModifyUserRequest {
  uint64 user_id = 1;
  RegisterRequest data = 2;
}

message DeactivateUserRequest {
  uint64 user_id = 1;
}

message DeleteUserRequest {
  uint64 user_id = 1;
}

message UserResponse {
  uint64 user_id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  string phone = 5;
  bool status = 6;
  string created_at = 7;
  string updated_at = 8;
}

message LoginResponse {
  UserResponse user = 1;
  string token = 2;
}

message SuccessResponse {
  bool success = 1;
}
