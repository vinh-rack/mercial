version: '3.9'

services:
  inventory_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  inventory:
    build: .
    ports:
      - "50051:50051"
    depends_on:
      - inventory_db
    environment:
      DB_HOST: ${DB}
      DB_NAME: ${DB}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
